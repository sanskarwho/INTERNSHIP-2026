{% extends 'base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<h1>Register</h1>

<form method="POST">

    {% csrf_token %}

    <label>Username</label>

    <input type="text"
           name="username">

    <label>Email</label>

    <input type="email"
           name="email">

    <label>Password</label>

    <input type="password"
           name="password">

    <button type="submit">
        Register
    </button>

</form>

{% endblock %}
