{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h1>Login</h1>

<form method="POST">

    {% csrf_token %}

    <label>Username</label>

    <input type="text"
           name="username">

    <label>Password</label>

    <input type="password"
           name="password">

    <button type="submit">
        Login
    </button>

</form>

{% endblock %}
